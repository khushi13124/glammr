{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image View - Fashion Inspiration</title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/image_view.css' %}">
</head>
<body>
  <!-- Navbar -->
    {% if user.is_authenticated %}
      {% include 'navbar.html' %}
    {% endif %}

  <!-- Main Content -->
  <div class="page-container">
    <div class="main-content">
      <!-- Enhanced Header -->
      <div class="header-section">
        <div class="header-content">
          <a href="#" class="back-button" id="backButton">
            <i class="bi bi-arrow-left"></i>
            <span id="backButtonText">Back to Home</span>
          </a>
          <h1 class="page-title">Image Details</h1>
        </div>
        
        <!-- Header decoration -->
        <div class="header-decoration">
          <div class="deco-circle deco-1"></div>
          <div class="deco-circle deco-2"></div>
        </div>
      </div>

      <!-- Content Grid -->
      <div class="content-grid">
        <!-- Image Section -->
        <div class="image-section">
          <div class="image-container">
            <div class="image-loader" id="imageLoader">
              <div class="loading-spinner"></div>
              <p>Loading image...</p>
            </div>
            <img src="" alt="Selected Image" class="main-image" id="mainImage">
          </div>
          
          <!-- Similar Images -->
          <div class="similar-images-section">
            <h5>Discover Similar</h5>
            <div id="similarImagesGrid" class="similar-images-grid"></div>
            <p id="noSimilarImagesMsg" style="display:none;">No similar images found.</p>
          </div>
        </div>

        <!-- Actions Panel -->
        <div class="actions-panel">
          <div class="panel-header">
            <h3 class="panel-title">
              <i class="bi bi-pin-angle"></i>
              Save to Board
            </h3>
          </div>

          <div class="panel-content">
            <!-- Boards Loading -->
            <div class="boards-loader" id="boardsLoader">
              <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <p>Loading boards...</p>
            </div>

            <!-- Boards List -->
            <div class="boards-container" id="boardsContainer">
              <div class="boards-grid" id="boardsGrid"></div>
            </div>

            <!-- Create New Board -->
            <div class="create-board-section">
              <h4 class="create-title">Create New Board</h4>
              <div class="input-group">
                <input type="text" class="board-input" id="newBoardInput" placeholder="Enter board name..." maxlength="50">
                <button class="create-button" id="createBoardButton">
                  <i class="bi bi-plus-lg"></i>
                  Create
                </button>
              </div>
            </div>

            <!-- Messages -->
            <div class="message-area">
              <div class="success-message" id="successMessage">
                <i class="bi bi-check-circle"></i>
                <span class="message-text"></span>
              </div>
              <div class="error-message" id="errorMessage">
                <i class="bi bi-exclamation-circle"></i>
                <span class="message-text"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/image_view.js' %}"></script>
  <script>
    lucide.createIcons();
    
    // NEW: Enhanced navigation logic
    function setupNavigation() {
      const urlParams = new URLSearchParams(window.location.search);
      const referrer = urlParams.get('from') || 'index';
      const boardId = urlParams.get('board_id') || '';
      const backButton = document.getElementById('backButton');
      const backButtonText = document.getElementById('backButtonText');
      
      // Set back button text and destination based on referrer
      switch (referrer) {
        case 'view_board':
          backButtonText.textContent = 'Back to Board';
          if (boardId) {
            backButton.href = `/view-board/${boardId}/`;
          } else {
            backButton.href = "{% url 'my_boards' %}";
          }
          break;
        case 'my_boards':
          backButtonText.textContent = 'Back to Boards';
          backButton.href = "{% url 'my_boards' %}";
          break;
        case 'my_feed':
          backButtonText.textContent = 'Back to Feed';
          backButton.href = "{% url 'my_feed' %}";
          break;
        default:
          backButtonText.textContent = 'Back to Home';
          backButton.href = "{% url 'index' %}";
      }
    }

    // Initialize navigation on page load
    document.addEventListener('DOMContentLoaded', function() {
      setupNavigation();
    });

    window.imageViewerConfig = {
      csrfToken: '{{ csrf_token }}',
      createBoardUrl: '{% url "create_board" %}',
      saveToBoardUrl: '{% url "save_to_board" %}',
      imageDetailUrl: '{% url "get_image_detail" %}',
      homeUrl: '{% url "index" %}',
      // NEW: Enhanced config for better save behavior
      currentPage: 'image_view',
      referrer: new URLSearchParams(window.location.search).get('from') || 'index'
    };
  </script>
  
  <!-- NEW: Enhanced image_view.js functionality -->
  <script>
    // Override the save functionality to stay on current page
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for the original image_view.js to load, then enhance it
      setTimeout(function() {
        enhanceSaveFunctionality();
      }, 100);
    });

    function enhanceSaveFunctionality() {
      // Override board click handlers to prevent redirects
      const boardsGrid = document.getElementById('boardsGrid');
      if (boardsGrid) {
        // Use event delegation for dynamically loaded boards
        boardsGrid.addEventListener('click', function(e) {
          const boardCard = e.target.closest('.board-card');
          if (boardCard) {
            e.preventDefault();
            e.stopPropagation();
            
            const boardId = boardCard.dataset.boardId;
            const boardName = boardCard.querySelector('.board-name')?.textContent || 'Board';
            const imageUrl = document.getElementById('mainImage')?.src;
            
            if (boardId && imageUrl) {
              saveToBoard(boardId, boardName, imageUrl);
            }
          }
        });
      }

      // Override create board functionality
      const createBoardButton = document.getElementById('createBoardButton');
      if (createBoardButton) {
        createBoardButton.addEventListener('click', function(e) {
          e.preventDefault();
          const boardName = document.getElementById('newBoardInput')?.value?.trim();
          const imageUrl = document.getElementById('mainImage')?.src;
          
          if (boardName && imageUrl) {
            createBoardAndSave(boardName, imageUrl);
          }
        });
      }
    }

    function saveToBoard(boardId, boardName, imageUrl) {
      const button = document.querySelector(`[data-board-id="${boardId}"]`);
      const originalContent = button?.innerHTML;
      
      // Show loading state
      if (button) {
        button.innerHTML = '<i class="bi bi-hourglass-split"></i> Saving...';
        button.disabled = true;
      }

      fetch(window.imageViewerConfig.saveToBoardUrl, {
        method: 'POST',
        headers: {
          'X-CSRFToken': window.imageViewerConfig.csrfToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          board_id: boardId,
          image_url: imageUrl,
          source_page: 'image_view' // NEW: Indicate source
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'success') {
          showSuccessMessage(`Image saved to ${boardName}!`);
          
          // Update button to show saved state
          if (button) {
            button.innerHTML = '<i class="bi bi-check-circle"></i> Saved!';
            button.classList.add('saved');
            
            // Reset after delay
            setTimeout(() => {
              button.innerHTML = originalContent;
              button.disabled = false;
              button.classList.remove('saved');
            }, 2000);
          }
          
          // Sync with other tabs
          localStorage.setItem('sync_event', JSON.stringify({
            action: 'save_image',
            image_url: imageUrl,
            board_id: boardId,
            board_name: boardName,
            board_image_count: data.board_image_count,
            inspo_id: data.inspo_id,
            ts: Date.now()
          }));
          
        } else {
          showErrorMessage(data.message || 'Failed to save image');
          if (button) {
            button.innerHTML = originalContent;
            button.disabled = false;
          }
        }
      })
      .catch(error => {
        console.error('Save error:', error);
        showErrorMessage('Failed to save image');
        if (button) {
          button.innerHTML = originalContent;
          button.disabled = false;
        }
      });
    }

    function createBoardAndSave(boardName, imageUrl) {
      const button = document.getElementById('createBoardButton');
      const input = document.getElementById('newBoardInput');
      const originalContent = button?.innerHTML;
      
      // Show loading state
      if (button) {
        button.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating...';
        button.disabled = true;
      }

      fetch(window.imageViewerConfig.createBoardUrl, {
        method: 'POST',
        headers: {
          'X-CSRFToken': window.imageViewerConfig.csrfToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name: boardName })
      })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'success') {
          // Clear input
          if (input) input.value = '';
          
          // Now save to the new board
          saveToBoard(data.board_id, data.board_name, imageUrl);
          
          // Add new board to the grid
          addBoardToGrid(data.board_id, data.board_name);
          
        } else {
          showErrorMessage(data.message || 'Failed to create board');
        }
      })
      .catch(error => {
        console.error('Create board error:', error);
        showErrorMessage('Failed to create board');
      })
      .finally(() => {
        if (button) {
          button.innerHTML = originalContent;
          button.disabled = false;
        }
      });
    }

    function addBoardToGrid(boardId, boardName) {
      const boardsGrid = document.getElementById('boardsGrid');
      if (!boardsGrid) return;

      const boardCard = document.createElement('div');
      boardCard.className = 'board-card';
      boardCard.dataset.boardId = boardId;
      boardCard.innerHTML = `
        <div class="board-preview">
          <i class="bi bi-collection"></i>
        </div>
        <div class="board-info">
          <h6 class="board-name">${boardName}</h6>
          <small class="board-count">0 images</small>
        </div>
      `;
      
      boardsGrid.insertBefore(boardCard, boardsGrid.firstChild);
    }

    function showSuccessMessage(message) {
      const successEl = document.getElementById('successMessage');
      if (successEl) {
        successEl.querySelector('.message-text').textContent = message;
        successEl.style.display = 'flex';
        successEl.classList.add('show');
        setTimeout(() => {
          successEl.style.display = 'none';
          successEl.classList.remove('show');
        }, 3000);
      }
    }

    function showErrorMessage(message) {
      const errorEl = document.getElementById('errorMessage');
      if (errorEl) {
        errorEl.querySelector('.message-text').textContent = message;
        errorEl.style.display = 'flex';
        errorEl.classList.add('show');
        setTimeout(() => {
          errorEl.style.display = 'none';
          errorEl.classList.remove('show');
        }, 3000);
      }
    }
  </script>
</body>
</html>
